# Loki — SingleBinary 모드, e2-medium에 맞춘 최소 리소스 (학습용)
deploymentMode: SingleBinary

loki:
  # schema_config 자동 생성 (없으면 기동 즉시 CrashLoopBackOff)
  useTestSchema: true
  # 인증 없이 단일 테넌트로 동작 (학습용)
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
    # 최신 chart 필수 — 없으면 "Please define loki.storage.bucketNames.chunks" 에러
    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin
  limits_config:
    retention_period: 24h

# SingleBinary 1 레플리카, 리소스 축소
singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
    limits:
      memory: 256Mi
  # /var/loki 쓰기 경로 확보 — persistence 끄면 read-only FS로 CrashLoop
  persistence:
    enabled: true
    size: 2Gi

# loki-canary DaemonSet 비활성 (리소스 절약)
lokiCanary:
  enabled: false

# 학습용 — 불필요한 컴포넌트 비활성화
chunksCache:
  enabled: false
resultsCache:
  enabled: false
minio:
  enabled: false
gateway:
  enabled: false

# 배포 모드 관련 스케일 0 (SingleBinary만 사용)
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# 이 차트가 만드는 Grafana 데이터소스 — 기본값(default) 아님으로 고정
# (Prometheus가 이미 default. 두면 "multiple datasources marked as default" 에러)
monitoring:
  dashboards:
    enabled: false
  rules:
    enabled: false
  serviceMonitor:
    enabled: false
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false

test:
  enabled: false
