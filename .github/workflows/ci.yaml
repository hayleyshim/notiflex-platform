name: CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/ci.yaml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet

      - name: Build and push image (SHA tag)
        run: |
          IMAGE="asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/notiflex/api:sha-${GITHUB_SHA::7}"
          docker build -t "$IMAGE" app/
          docker push "$IMAGE"
          echo "Pushed $IMAGE"
          # 다음 step에서 사용하도록 GITHUB_ENV로 전달 (GITHUB_OUTPUT 아님에 주의)
          echo "IMAGE_URI=$IMAGE" >> "$GITHUB_ENV"

      - name: Update manifest image tag and commit (GitOps)
        run: |
          # 빈 값 방어: IMAGE_URI가 비어 있으면 매니페스트 이미지가 삭제되므로 즉시 중단
          if [ -z "$IMAGE_URI" ]; then
            echo "IMAGE_URI is empty — aborting to avoid corrupting manifest"; exit 1
          fi
          echo "Updating rollout.yaml image → $IMAGE_URI"
          sed -i -E "s#(image: ).*/notiflex/api:.*#\1${IMAGE_URI}#" k8s/smb/rollout.yaml
          grep "image:" k8s/smb/rollout.yaml

          if git diff --quiet k8s/smb/rollout.yaml; then
            echo "No manifest change — skipping commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/smb/rollout.yaml
          # [skip ci]로 이 매니페스트 커밋이 CI를 재트리거하지 않게 한다 (무한 루프 방지)
          git commit -m "deploy: update image to sha-${GITHUB_SHA::7} [skip ci]"
          git push origin HEAD:main
