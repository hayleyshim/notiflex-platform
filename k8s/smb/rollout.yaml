apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: notiflex-api
  namespace: notiflex
  labels:
    app: notiflex-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notiflex-api
  template:
    metadata:
      labels:
        app: notiflex-api
    spec:
      # Workload Identity로 GCP Secret Manager에 접근하는 KSA
      serviceAccountName: notiflex-sa
      containers:
        - name: notiflex-api
          image: asia-northeast3-docker.pkg.dev/hayley-gitaiops-project/notiflex/api:sha-28754d5
          ports:
            - containerPort: 8080
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: VALKEY_ADDR
              value: valkey-primary.notiflex.svc.cluster.local:6379
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: valkey
                  key: valkey-password
            # CSI로 마운트된 Secret Manager 비밀번호 파일 (env보다 우선 사용)
            - name: VALKEY_PASSWORD_FILE
              value: /mnt/secrets/valkey-password
          volumeMounts:
            - name: secrets
              mountPath: /mnt/secrets
              readOnly: true
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        # GKE managed CSI driver로 Secret Manager 시크릿을 파일로 마운트
        - name: secrets
          csi:
            driver: secrets-store-gke.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: notiflex-secrets
  strategy:
    blueGreen:
      # 현재 트래픽을 받는 서비스 (active)
      activeService: notiflex-api
      # 새 버전 미리보기 서비스 (preview) — 프로모션 전 테스트용
      previewService: notiflex-api-preview
      # 30초 후 자동으로 active로 승격
      autoPromotionEnabled: true
      autoPromotionSeconds: 30
