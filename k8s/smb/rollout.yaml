apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: notiflex-api
  namespace: notiflex
  labels:
    app: notiflex-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notiflex-api
  template:
    metadata:
      labels:
        app: notiflex-api
    spec:
      # Workload Identity로 GCP Secret Manager에 접근하는 KSA
      serviceAccountName: notiflex-sa
      containers:
        - name: notiflex-api
          image: asia-northeast3-docker.pkg.dev/hayley-gitaiops-project/notiflex/api:v0.6.0
          ports:
            - containerPort: 8080
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: VALKEY_ADDR
              value: valkey-primary.notiflex.svc.cluster.local:6379
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: valkey
                  key: valkey-password
            # CSI로 마운트된 Secret Manager 비밀번호 파일 (env보다 우선 사용)
            - name: VALKEY_PASSWORD_FILE
              value: /mnt/secrets/valkey-password
          volumeMounts:
            - name: secrets
              mountPath: /mnt/secrets
              readOnly: true
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        # GKE managed CSI driver로 Secret Manager 시크릿을 파일로 마운트
        - name: secrets
          csi:
            driver: secrets-store-gke.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: notiflex-secrets
  strategy:
    canary:
      # 안정(현재) 버전 트래픽을 받는 서비스
      stableService: notiflex-api
      # canary(새) 버전 트래픽을 받는 서비스 (5장 preview 서비스 재사용)
      canaryService: notiflex-api-preview
      # 트래픽을 20% → 50% → 80% → 100%로 점진 이동, 각 단계 30초 관찰
      steps:
        - setWeight: 20
        - pause: { duration: 30s }
        - setWeight: 50
        - pause: { duration: 30s }
        - setWeight: 80
        - pause: { duration: 30s }
