apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: notiflex-secrets
  namespace: notiflex
spec:
  # GKE managed CSI는 provider=gke (오픈소스는 gcp)
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/hayley-gitaiops-project/secrets/valkey-password/versions/latest"
        path: "valkey-password"
