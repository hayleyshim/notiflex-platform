apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-datasource
  namespace: monitoring
  labels:
    # Grafana 사이드카가 이 라벨이 붙은 ConfigMap을 데이터소스로 자동 등록
    grafana_datasource: "1"
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        # Prometheus가 이미 기본 데이터소스이므로 false (multiple default 에러 방지)
        isDefault: false
        editable: true
